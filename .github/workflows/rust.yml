name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install SQLite, Font, Audio, and Windowing dependencies
      run: |
        sudo apt-get update && sudo apt-get install -y \
          libsqlite3-dev \
          pkg-config \
          libfontconfig1-dev \
          libasound2-dev \
          libwayland-dev \
          libxkbcommon-dev \
          libx11-dev
    - name: Build
      run: cargo build --verbose 
    - name: Run tests
      run: cargo test --verbose
